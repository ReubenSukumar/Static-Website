name: Deploy Static Website to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify required files
        run: |
          test -f Top-gun/index.html
          test -f Top-gun/style.css
          test -f Top-gun/assets/hero.jpg

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Upload website files to EC2 temp directory
        run: |
          rsync -avz --delete \
            --exclude ".git" \
            --exclude ".github" \
            ./ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/jet-site/

      - name: Deploy website on EC2
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF
            mkdir -p /tmp/jet-site
            sudo mkdir -p ${{ secrets.TARGET_DIR }}
            sudo rsync -av --delete /tmp/jet-site/ ${{ secrets.TARGET_DIR }}/
            sudo chown -R www-data:www-data ${{ secrets.TARGET_DIR }}
            sudo nginx -t
            sudo systemctl reload nginx
          EOF
