name: Deploy Static Website to EC2

on:
  workflow_run:
    workflows:
      - Validate Static Website Files
    types:
      - completed
    branches:
      - main
      - Testing
      - Test-UI
      - Test-Feature
      - Deployment

  schedule:
    - cron: '*/5 * * * *'  # Runs every 5 Minutes

jobs:
  deploy_from_validation:
    if: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - name: Set branch name from triggering workflow
        run: echo "BRANCH_NAME=${{ github.event.workflow_run.head_branch }}" >> $GITHUB_ENV

      - name: Checkout triggering branch
        uses: actions/checkout@v4
        with:
          ref: ${{ env.BRANCH_NAME }}

      - name: Verify required files
        run: |
          test -f Top-gun/index.html
          test -f Top-gun/style.css
          test -f Top-gun/assets/JW.jpg

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Set target directory based on triggering branch
        run: |
          if [ "${BRANCH_NAME}" = "main" ]; then
            echo "TARGET_DIR=/var/www/top-gun-site" >> $GITHUB_ENV
          elif [ "${BRANCH_NAME}" = "Testing" ]; then
            echo "TARGET_DIR=/var/www/top-gun-site-test" >> $GITHUB_ENV
          elif [ "${BRANCH_NAME}" = "Test-UI" ]; then
            echo "TARGET_DIR=/var/www/top-gun-site-Test-UI" >> $GITHUB_ENV
          elif [ "${BRANCH_NAME}" = "Test-Feature" ]; then
            echo "TARGET_DIR=/var/www/top-gun-site-Test-Feature" >> $GITHUB_ENV
          elif [ "${BRANCH_NAME}" = "Deployment" ]; then
            echo "TARGET_DIR=/var/www/top-gun-site-Deployment" >> $GITHUB_ENV
          else
            echo "Unsupported branch: ${BRANCH_NAME}"
            exit 1
          fi

      - name: Upload website files to EC2 temp directory
        run: |
          rsync -avz --delete \
            --exclude ".git" \
            --exclude ".github" \
            ./Top-gun/ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/top-gun-site/

      - name: Deploy website on EC2
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF
            sudo mkdir -p ${TARGET_DIR}
            sudo rsync -av --delete /tmp/top-gun-site/ ${TARGET_DIR}/
            sudo chown -R www-data:www-data ${TARGET_DIR}
            sudo chmod -R 755 ${TARGET_DIR}
            sudo nginx -t
            sudo systemctl reload nginx
          EOF

  deploy_deployment_branch_on_schedule:
    if: ${{ github.event_name == 'schedule' }}
    runs-on: ubuntu-latest

    steps:
      - name: Set Deployment branch variables
        run: |
          echo "BRANCH_NAME=Deployment" >> $GITHUB_ENV
          echo "TARGET_DIR=/var/www/top-gun-site-Deployment" >> $GITHUB_ENV

      - name: Checkout Deployment branch
        uses: actions/checkout@v4
        with:
          ref: Deployment

      - name: Verify required files
        run: |
          test -f Top-gun/index.html
          test -f Top-gun/style.css
          test -f Top-gun/assets/JW.jpg

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Upload Deployment branch files to EC2 temp directory
        run: |
          rsync -avz --delete \
            --exclude ".git" \
            --exclude ".github" \
            ./Top-gun/ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/top-gun-site/

      - name: Deploy Deployment branch on EC2
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF
            sudo mkdir -p ${TARGET_DIR}
            sudo rsync -av --delete /tmp/top-gun-site/ ${TARGET_DIR}/
            sudo chown -R www-data:www-data ${TARGET_DIR}
            sudo chmod -R 755 ${TARGET_DIR}
            sudo nginx -t
            sudo systemctl reload nginx
          EOF
