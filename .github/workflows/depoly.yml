name: Deploy Static Website to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: EC2-Deploy

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify required files
        run: |
          test -f Top-gun/index.html
          test -f Top-gun/style.css
          test -f Top-gun/assests/hero.jpg

      - name: Debug secrets presence
        run: |
          if [ -z "${{ secrets.EC2_HOST }}" ]; then echo "EC2_HOST is empty"; else echo "EC2_HOST is set"; fi
          if [ -z "${{ secrets.EC2_USER }}" ]; then echo "EC2_USER is empty"; else echo "EC2_USER is set"; fi
          if [ -z "${{ secrets.EC2_SSH_KEY }}" ]; then echo "EC2_SSH_KEY is empty"; else echo "EC2_SSH_KEY is set"; fi
      
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Upload website files to EC2 temp directory
        run: |
          rsync -avz --delete \
            --exclude ".git" \
            --exclude ".github" \
            ./Top-gun/ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/top-gun-site/

      - name: Deploy website on EC2
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
            sudo mkdir -p /var/www/top-gun-site
            sudo rsync -av --delete /tmp/top-gun-site/ /var/www/top-gun-site/
            sudo chown -R www-data:www-data /var/www/top-gun-site
            sudo chmod -R 755 /var/www/top-gun-site
            sudo nginx -t
            sudo systemctl reload nginx
          EOF
