name: Deploy Static Website to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy Website to EC2
        run: |
          rsync -avz --delete ./site/ ubuntu@${{ secrets.EC2_HOST }}:/var/www/top-gun-site/

      - name: Reload NGINX
        run: |
          ssh ubuntu@${{ secrets.EC2_HOST }} "sudo systemctl reload nginx"
