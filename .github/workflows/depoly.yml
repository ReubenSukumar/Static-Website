name: Deploy Static Website to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repo contents
        run: |
          pwd
          find . -maxdepth 3 -type f | sort

      - name: Verify required files
        run: |
          test -f Top-gun/index.html
          test -f Top-gun/style.css
          test -f Top-gun/assets/hero.jpg

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "echo CONNECTED && whoami && hostname"

      - name: Prepare target directory on EC2
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "
            mkdir -p /home/${{ secrets.EC2_USER }}/top-gun-upload &&
            rm -rf /home/${{ secrets.EC2_USER }}/top-gun-upload/* &&
            sudo mkdir -p /var/www/top-gun-site
          "

      - name: Copy site files to EC2 home directory
        run: |
          scp -i ~/.ssh/id_ed25519 -r \
            index.html style.css assets \
            "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/home/${{ secrets.EC2_USER }}/top-gun-upload/"

      - name: Verify copied files on EC2
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "
            echo 'HOME UPLOAD CONTENTS:' &&
            find /home/${{ secrets.EC2_USER }}/top-gun-upload -maxdepth 3 -type f | sort
          "

      - name: Deploy files into NGINX web root
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "
            sudo rm -rf /var/www/top-gun-site/* &&
            sudo cp -r /home/${{ secrets.EC2_USER }}/top-gun-upload/* /var/www/top-gun-site/ &&
            sudo chown -R www-data:www-data /var/www/top-gun-site &&
            sudo find /var/www/top-gun-site -type d -exec chmod 755 {} \; &&
            sudo find /var/www/top-gun-site -type f -exec chmod 644 {} \; &&
            sudo nginx -t &&
            sudo systemctl reload nginx
          "

      - name: Verify deployed files
        run: |
          ssh -i ~/.ssh/id_ed25519 "${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}" "
            echo 'WEB ROOT CONTENTS:' &&
            find /var/www/top-gun-site -maxdepth 3 -type f | sort
          "
