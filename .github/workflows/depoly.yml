name: Deploy Static Website to EC2

on:
  push:
    branches:
      - main
      - Testing
      - Deployment

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify required files
        run: |
          test -f Top-gun/index.html
          test -f Top-gun/style.css
          test -f Top-gun/assets/JW.jpg

      - name: Setup SSH 
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Set target directory based on branch
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "TARGET_DIR=/var/www/top-gun-site" >> $GITHUB_ENV
          elif [ "${GITHUB_REF_NAME}" = "Testing" ]; then
            echo "TARGET_DIR=/var/www/top-gun-site-test" >> $GITHUB_ENV
          elif [ "${GITHUB_REF_NAME}" = "Deployment" ]; then
            echo "TARGET_DIR=/var/www/top-gun-site-Deployment" >> $GITHUB_ENV            
          else
            echo "Unsupported branch: ${GITHUB_REF_NAME}"
            exit 1
          fi

      - name: Upload website files to EC2 temp directory
        run: |
          rsync -avz --delete \
            --exclude ".git" \
            --exclude ".github" \
            ./Top-gun/ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/top-gun-site/

      - name: Deploy website on EC2
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << EOF
            sudo mkdir -p ${TARGET_DIR}
            sudo rsync -av --delete /tmp/top-gun-site/ ${TARGET_DIR}/
            sudo chown -R www-data:www-data ${TARGET_DIR}
            sudo chmod -R 755 ${TARGET_DIR}
            sudo nginx -t
            sudo systemctl reload nginx
          EOF
