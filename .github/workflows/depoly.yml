name: Deploy Static Website to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          if [ -z "$EC2_HOST" ]; then
            echo "EC2_HOST secret is missing"
            exit 1
          fi

          if [ -z "$EC2_SSH_KEY" ]; then
            echo "EC2_SSH_KEY secret is missing"
            exit 1
          fi

          mkdir -p ~/.ssh
          printf "%s\n" "$EC2_SSH_KEY" > ~/.ssh/ec2_key.pem
          chmod 600 ~/.ssh/ec2_key.pem
          ssh-keyscan -H "$EC2_HOST" >> ~/.ssh/known_hosts

      - name: Deploy Website to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          rsync -avz --delete -e "ssh -i ~/.ssh/ec2_key.pem" ./site/ ubuntu@"$EC2_HOST":/var/www/top-gun-site/

      - name: Reload NGINX
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          ssh -i ~/.ssh/ec2_key.pem ubuntu@"$EC2_HOST" "sudo systemctl reload nginx"
