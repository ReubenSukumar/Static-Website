name: Deploy Static Website to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show repo files in runner
        run: |
          echo "PWD:"
          pwd
          echo "FILES:"
          find . -maxdepth 3 -type f | sort

      - name: Verify required files
        run: |
          test -f index.html
          test -f style.css
          test -f assets/hero.jpg
          echo "Required files exist in GitHub runner"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "echo CONNECTED && whoami && hostname"

      - name: Create temp directory on EC2
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "rm -rf /tmp/jet-site && mkdir -p /tmp/jet-site && ls -ld /tmp/jet-site"

      - name: Upload website files to EC2 temp directory
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/id_ed25519" \
            --exclude ".git" \
            --exclude ".github" \
            ./ ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/tmp/jet-site/

      - name: Verify temp files on EC2
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "echo 'TEMP CONTENTS:' && find /tmp/jet-site -maxdepth 3 -type f | sort"

      - name: Deploy website on EC2
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "
            sudo mkdir -p ${{ secrets.TARGET_DIR }} &&
            sudo rsync -av --delete /tmp/jet-site/ ${{ secrets.TARGET_DIR }}/ &&
            sudo chown -R www-data:www-data ${{ secrets.TARGET_DIR }} &&
            echo 'TARGET CONTENTS:' &&
            sudo find ${{ secrets.TARGET_DIR }} -maxdepth 3 -type f | sort &&
            sudo nginx -t &&
            sudo systemctl reload nginx
          "

      - name: Show nginx site config
        run: |
          ssh -i ~/.ssh/id_ed25519 ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "sudo grep -R 'root ' /etc/nginx/sites-enabled /etc/nginx/conf.d 2>/dev/null || true"
