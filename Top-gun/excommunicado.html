<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Excommunicado</title>
  <link rel="stylesheet" href="excommunicado.css" />
</head>
<body>
  <div class="background-grid"></div>
  <div class="background-noise"></div>
  <div class="scan-line"></div>

  <main class="page">
    <section class="hero">
      <h1 class="title">EXCOMMUNICADO</h1>

      <div class="subtitle-row">
        <span class="line"></span>
        <p class="subtitle">All services revoked. Contract active.</p>
        <span class="line"></span>
      </div>

      <p class="meta">
        <span>Status: <strong>ACTIVE</strong></span>
        <span class="divider">|</span>
        <span>Marker access revoked</span>
        <span class="divider">|</span>
        <span>Last verified: Continental Network</span>
      </p>

      <section class="countdown" aria-label="Countdown timer">
        <div class="time-card">
          <div class="digit-frame">
            <span id="days">10</span>
          </div>
          <p>DAYS</p>
        </div>

        <div class="time-card">
          <div class="digit-frame">
            <span id="hours">06</span>
          </div>
          <p>HOURS</p>
        </div>

        <div class="time-card">
          <div class="digit-frame">
            <span id="minutes">56</span>
          </div>
          <p>MINUTES</p>
        </div>

        <div class="time-card">
          <div class="digit-frame">
            <span id="seconds">09</span>
          </div>
          <p>SECONDS</p>
        </div>
      </section>

      <div class="actions">
        <a href="index.html" class="return-btn">Return to Continental</a>
      </div>
    </section>
  </main>

  <script src="excommunicado.js"></script>
</body>
</html>
